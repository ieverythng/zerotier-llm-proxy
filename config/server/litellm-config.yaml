# LiteLLM proxy config for the default llama.cpp backend.
# Place at: C:\Users\Admin\PROJECTS\zerotier-llm-proxy\config\server\litellm-config.yaml

model_list:
  # Retained compatibility alias. Defaults to llama.cpp unless a dedicated
  # Lucebox runtime configuration is started.
  - model_name: qwen36-turbo-hermes-spec
    litellm_params:
      model: openai/qwen36-turbo-hermes
      api_base: http://127.0.0.1:8080/v1
      api_key: os.environ/LLAMA_CPP_API_KEY

  # Stable Hermes/Codex alias.
  - model_name: qwen36-turbo-hermes
    litellm_params:
      model: openai/qwen36-turbo-hermes
      api_base: http://127.0.0.1:8080/v1
      api_key: os.environ/LLAMA_CPP_API_KEY

  # Explicit llama.cpp alias.
  - model_name: qwen36-turbo-hermes-llama
    litellm_params:
      model: openai/qwen36-turbo-hermes
      api_base: http://127.0.0.1:8080/v1
      api_key: os.environ/LLAMA_CPP_API_KEY

litellm_settings:
  drop_params: true
  request_timeout: 600
  set_verbose: false
  # Allow streaming for speculative decoding benefits
  stream_options_include_usage: true

env_vars:
  LLAMA_CPP_API_KEY: placeholder
