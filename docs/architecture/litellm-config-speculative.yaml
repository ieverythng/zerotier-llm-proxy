# LiteLLM proxy config for speculative decoding setup
# Place at: C:\Users\Admin\PROJECTS\zerotier-llm-proxy\config\server\litellm-config.yaml
# Or at: C:\Users\Admin\.litellm\config.yaml

model_list:
  # Main model with speculative decoding (DFlash draft)
  - model_name: qwen36-turbo-hermes-spec
    litellm_params:
      model: openai/qwen36-turbo-hermes-spec
      api_base: http://127.0.0.1:8080/v1
      api_key: os.environ/LLAMA_CPP_API_KEY

  # Legacy alias for backward compatibility (points to same server)
  - model_name: qwen36-turbo-hermes
    litellm_params:
      model: openai/qwen36-turbo-hermes-spec
      api_base: http://127.0.0.1:8080/v1
      api_key: os.environ/LLAMA_CPP_API_KEY

litellm_settings:
  drop_params: true
  request_timeout: 600
  set_verbose: false
  # Allow streaming for speculative decoding benefits
  stream_options_include_usage: true

env_vars:
  LLAMA_CPP_API_KEY: placeholder
